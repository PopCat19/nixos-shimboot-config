# flake-check.yml
#
# Purpose: Validates Nix flake configuration and formats .nix files
# Triggers: Push/PR to any branch with Nix file changes, manual dispatch

name: flake-check

on:
  push:
    paths:
      - '**.nix'
      - '**.lock'
  pull_request:
    paths:
      - '**.nix'
      - '**.lock'


permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Auto-format Nix files
        run: |
          echo "✨ Running nix fmt..."
          nix fmt .

          if ! git diff --quiet; then
            echo "💾 Formatting changes detected."
          else
            echo "✅ Already properly formatted."
          fi

      - name: Verify formatting
        run: |
          echo "🔍 Verifying final formatting..."
          nix fmt -- --fail-on-change .
          echo "✅ Format verified."

      - name: Check flake
        run: |
          echo "🔍 Validating flake configuration..."
          nix flake check --accept-flake-config

          echo "## ✅ Flake Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          nix flake show --accept-flake-config >> $GITHUB_STEP_SUMMARY
